services:
  postgres:
    image: postgres:16
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dmsdb_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dmsdb_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dms_postgres_data:
